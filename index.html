<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>שיקויים מכושפים</title>
    <style>
        :root {
            --magic-purple: #9333ea;
            --magic-deep: #680149;
            --magic-dark: #0A0909;
            --text-main: #ffffff;
            --bg-gradient: linear-gradient(to right, var(--magic-dark), var(--magic-deep));
            --btn-gradient: linear-gradient(135deg, #9333ea 0%, #680149 100%);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', system-ui, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: var(--bg-gradient);
            height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: env(safe-area-inset-top) 15px env(safe-area-inset-bottom) 15px;
            color: var(--text-main);
        }

        /* Start Screen */
        #start-screen {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: url('https://i.imgur.com/EVAP4aM.png') no-repeat center center;
            background-size: cover;
            z-index: 3000;
            display: flex;
            flex-direction: column;
            justify-content: flex-end;
            align-items: center;
            padding-bottom: 60px;
        }

        .start-buttons-container {
            display: flex;
            justify-content: space-between;
            width: 90%;
            max-width: 500px;
            gap: 20px;
        }

        .btn-menu {
            flex: 1;
            background: var(--btn-gradient);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.4);
            padding: 15px 10px;
            border-radius: 50px;
            font-size: 1.2rem;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 8px 15px rgba(0,0,0,0.4);
            transition: transform 0.2s;
        }

        header {
            width: 100%;
            padding: 10px 20px;
            display: flex;
            justify-content: flex-start;
            z-index: 10;
        }

        .stats { 
            font-size: 1.6rem; 
            font-weight: bold; 
            background: rgba(0, 0, 0, 0.3); 
            backdrop-filter: blur(5px);
            padding: 5px 20px; 
            border-radius: 50px; 
            border: 1px solid rgba(255,255,255,0.2);
            display: flex;
            align-items: center;
            gap: 5px;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            position: relative;
        }

        .pot-container {
            position: relative;
            width: 240px;
            height: 240px;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .cauldron-img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 15px 30px rgba(0,0,0,0.6));
            z-index: 10;
        }

        /* Flame Effect */
        .fire-container {
            position: absolute;
            bottom: 35px; 
            width: 120px;
            height: 60px;
            display: flex;
            justify-content: center;
            filter: blur(4px);
            z-index: 5;
        }

        .flame {
            position: absolute;
            bottom: 0;
            width: 30px;
            height: 30px;
            background: #ff5e00;
            border-radius: 50% 50% 20% 20%;
            transform: rotate(-45deg);
            animation: burn 0.5s infinite alternate;
            opacity: 0.8;
            box-shadow: 0 0 20px #ffea00;
        }

        .flame:nth-child(2) { left: 20px; animation-delay: 0.1s; background: #ffea00; width: 20px; height: 40px; }
        .flame:nth-child(3) { right: 20px; animation-delay: 0.2s; background: #ff1100; width: 25px; height: 35px; }

        @keyframes burn {
            from { transform: scale(1) translateY(0) rotate(-45deg); }
            to { transform: scale(1.2) translateY(-10px) rotate(-45deg); }
        }

        /* Steam/Smoke Effect */
        .steam-container {
            position: absolute;
            top: 20px;
            width: 100px;
            height: 100px;
            z-index: 15;
            pointer-events: none;
        }

        .steam-particle {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 20px;
            height: 20px;
            background: rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            filter: blur(8px);
            animation: rise 2s infinite ease-out;
            opacity: 0;
        }

        @keyframes rise {
            0% { transform: translate(-50%, 0) scale(1); opacity: 0; }
            20% { opacity: 0.5; }
            100% { transform: translate(-120%, -100px) scale(3); opacity: 0; }
        }

        /* Shelf */
        .shelf {
            width: auto;
            min-width: 100px;
            max-width: 95%;
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            border-radius: 30px;
            padding: 15px 25px;
            display: inline-flex;
            justify-content: center;
            gap: 15px;
            border: 1px solid rgba(255, 255, 255, 0.15);
            margin-bottom: 30px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.2), 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .ingredient {
            width: 60px;
            height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: transform 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .ingredient img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 4px 6px rgba(0,0,0,0.4));
        }

        .ingredient:active { transform: scale(0.85); }

        /* Modals */
        #modal, #instructions-modal {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            background: #ffffff;
            padding: 30px;
            border-radius: 30px;
            text-align: center;
            z-index: 4000;
            width: 90%;
            max-width: 380px;
            display: none;
            color: #1e293b;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
            border: 4px solid var(--magic-purple);
        }

        .timer-bar-container {
            width: 100%;
            height: 10px;
            background: #f1f5f9;
            border-radius: 10px;
            margin: 15px 0;
            overflow: hidden;
        }

        #timer-bar {
            width: 100%;
            height: 100%;
            background: var(--magic-purple);
        }

        .seq-preview {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
            margin: 20px 0;
            flex-wrap: wrap;
        }

        .seq-preview img {
            width: 45px;
            height: 45px;
            object-fit: contain;
        }

        /* SVG Arrow Style */
        .seq-arrow {
            width: 16px;
            height: 16px;
            color: var(--magic-purple);
            opacity: 0.6;
            flex-shrink: 0;
        }

        .ui-btn {
            background: var(--btn-gradient);
            color: white;
            border: none;
            padding: 14px 40px;
            border-radius: 50px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
        }

        #hint-text { margin-bottom: 12px; font-weight: bold; }

        .flying-item {
            position: fixed;
            pointer-events: none;
            z-index: 5000;
            width: 50px;
            height: 50px;
            object-fit: contain;
            transition: all 0.6s cubic-bezier(0.25, 0.46, 0.45, 0.94);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }
        .shake { animation: shake 0.4s ease-in-out; }
    </style>
</head>
<body>

    <div id="start-screen">
        <div class="start-buttons-container">
            <button class="btn-menu" onclick="showInstructions()">הוראות</button>
            <button class="btn-menu" onclick="startGame()">שחקו</button>
        </div>
    </div>

    <div id="instructions-modal">
        <h2 style="color: var(--magic-purple); margin-bottom: 15px;">איך משחקים?</h2>
        <p style="line-height: 1.6; margin-bottom: 25px;">
            זכרו את סדר המרכיבים שמופיע במתכון.<br>
            הקליקו עליהם לפי אותו הסדר כדי לרקוח שיקוי מושלם!
        </p>
        <button class="ui-btn" onclick="closeInstructions()">הבנתי!</button>
    </div>

    <header>
        <div class="stats" id="score-container">⭐<span id="score">0</span></div>
    </header>

    <main>
        <p id="hint-text">זכרו את המתכון!</p>
        <div class="pot-container">
            <!-- Steam Effect -->
            <div class="steam-container">
                <div class="steam-particle" style="animation-delay: 0s; left: 40%"></div>
                <div class="steam-particle" style="animation-delay: 0.5s; left: 50%"></div>
                <div class="steam-particle" style="animation-delay: 1.2s; left: 60%"></div>
            </div>
            <!-- Flame Effect -->
            <div class="fire-container">
                <div class="flame"></div>
                <div class="flame"></div>
                <div class="flame"></div>
            </div>
            <img src="https://www.thiings.co/_next/image?url=https%3A%2F%2Flftz25oez4aqbxpq.public.blob.vercel-storage.com%2Fimage-gh8wm5XCXrzYx8LPS6t0NymgQYEG07.png&w=500&q=75" 
                 class="cauldron-img" id="cauldron" alt="קדירה">
        </div>
    </main>

    <div class="shelf" id="shelf"></div>

    <div id="modal">
        <h2 id="modal-title">זכרו את הסדר:</h2>
        <div id="sequence-display" class="seq-preview"></div>
        <div class="timer-bar-container">
            <div id="timer-bar"></div>
        </div>
        <button class="ui-btn" id="modal-btn" onclick="startPlayerTurn()">אני מוכן!</button>
    </div>

    <script>
        const allItems = [
            { id: 1, url: 'https://www.thiings.co/_next/image?url=https%3A%2F%2Flftz25oez4aqbxpq.public.blob.vercel-storage.com%2Fimage-okSb6P6VxQwXTDfYgiOiheKJpixk2a.png&w=500&q=75' },
            { id: 2, url: 'https://www.thiings.co/_next/image?url=https%3A%2F%2Flftz25oez4aqbxpq.public.blob.vercel-storage.com%2Fimage-GvylfYY5TbfBaLpK00d2gM8D0RXjl1.png&w=500&q=75' },
            { id: 3, url: 'https://www.thiings.co/_next/image?url=https%3A%2F%2Flftz25oez4aqbxpq.public.blob.vercel-storage.com%2Fimage-sVRs8bTUqS7FRT7etrsNHK1IzUtlDv.png&w=500&q=75' },
            { id: 4, url: 'https://www.thiings.co/_next/image?url=https%3A%2F%2Flftz25oez4aqbxpq.public.blob.vercel-storage.com%2Fimage-vQK6BIN6YH9aNlr6Y97ZZXjbYnjmeI.png&w=500&q=75' },
            { id: 5, url: 'https://www.thiings.co/_next/image?url=https%3A%2F%2Flftz25oez4aqbxpq.public.blob.vercel-storage.com%2Fimage-NK0e2Lj1N5442ftvFRNQqKBYs3szJq.png&w=500&q=75' }
        ];

        let currentLevel = 1;
        let score = 0;
        let targetSeq = [];
        let playerSeq = [];
        let isAcceptingInput = false;

        function startGame() {
            document.getElementById('start-screen').style.display = 'none';
            score = 0;
            currentLevel = 1;
            updateScore();
            nextLevel();
        }

        function showInstructions() {
            document.getElementById('instructions-modal').style.display = 'block';
        }

        function closeInstructions() {
            document.getElementById('instructions-modal').style.display = 'none';
        }

        function nextLevel() {
            playerSeq = [];
            targetSeq = [];
            isAcceptingInput = false;
            document.getElementById('hint-text').innerText = "רוקחים את המתכון...";
            
            const availableItems = allItems.slice(0, Math.min(3 + Math.floor(currentLevel/3), 5));
            const seqLength = Math.min(2 + Math.floor(currentLevel / 2), 8);
            for(let i=0; i<seqLength; i++) {
                targetSeq.push(availableItems[Math.floor(Math.random() * availableItems.length)]);
            }

            setTimeout(showRecipe, 500);
            renderShelf(availableItems);
        }

        function renderShelf(itemsToShow) {
            const shelf = document.getElementById('shelf');
            shelf.innerHTML = '';
            
            itemsToShow.forEach((item) => {
                const div = document.createElement('div');
                div.className = 'ingredient';
                div.innerHTML = `<img src="${item.url}" alt="מרכיב">`;
                div.onclick = () => handleIngredientClick(item, div);
                shelf.appendChild(div);
            });
        }

        function showRecipe() {
            const modal = document.getElementById('modal');
            const display = document.getElementById('sequence-display');
            const timer = document.getElementById('timer-bar');
            
            display.innerHTML = '';
            
            // SVG Arrow Template
            const arrowSvg = `
                <svg class="seq-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M19 12H5M12 19l-7-7 7-7"/>
                </svg>
            `;

            targetSeq.forEach((item, index) => {
                const img = document.createElement('img');
                img.src = item.url;
                display.appendChild(img);

                // Add arrow if not the last item
                if (index < targetSeq.length - 1) {
                    const arrowSpan = document.createElement('span');
                    arrowSpan.innerHTML = arrowSvg;
                    display.appendChild(arrowSpan);
                }
            });

            modal.style.display = 'block';
            
            timer.style.transition = 'none';
            timer.style.width = '100%';
            const waitTime = 1500 + (targetSeq.length * 600);
            
            setTimeout(() => {
                timer.style.transition = `width ${waitTime}ms linear`;
                timer.style.width = '0%';
            }, 50);

            setTimeout(() => {
                if(modal.style.display === 'block' && !isAcceptingInput) {
                    startPlayerTurn();
                }
            }, waitTime + 100);
        }

        function startPlayerTurn() {
            document.getElementById('modal').style.display = 'none';
            isAcceptingInput = true;
            document.getElementById('hint-text').innerText = "עכשיו תורכם!";
        }

        function handleIngredientClick(item, el) {
            if(!isAcceptingInput) return;

            animateToCauldron(item, el);
            playerSeq.push(item);
            
            const currentIndex = playerSeq.length - 1;
            if(playerSeq[currentIndex].id !== targetSeq[currentIndex].id) {
                gameOver();
                return;
            }

            if(playerSeq.length === targetSeq.length) {
                isAcceptingInput = false;
                setTimeout(() => {
                    score += 10;
                    currentLevel++;
                    updateScore();
                    nextLevel();
                }, 800);
            }
        }

        function animateToCauldron(item, el) {
            const rect = el.getBoundingClientRect();
            const pot = document.getElementById('cauldron').getBoundingClientRect();
            
            const flyer = document.createElement('img');
            flyer.src = item.url;
            flyer.className = 'flying-item';
            flyer.style.top = rect.top + 'px';
            flyer.style.left = rect.left + 'px';
            document.body.appendChild(flyer);

            const destX = pot.left + (pot.width / 2) - 25;
            const destY = pot.top + 50;

            requestAnimationFrame(() => {
                flyer.style.top = destY + 'px';
                flyer.style.left = destX + 'px';
                flyer.style.transform = 'scale(0.3) rotate(180deg)';
                flyer.style.opacity = '0.5';
            });

            setTimeout(() => flyer.remove(), 600);
        }

        function gameOver() {
            isAcceptingInput = false;
            document.getElementById('cauldron').classList.add('shake');
            document.getElementById('hint-text').innerText = "אופס! נכשלתם.";
            
            setTimeout(() => {
                document.getElementById('cauldron').classList.remove('shake');
                document.getElementById('start-screen').style.display = 'flex';
            }, 1000);
        }

        function updateScore() {
            document.getElementById('score').innerText = score;
        }
    </script>
</body>
</html>
